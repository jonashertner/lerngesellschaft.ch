name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Prepare DE deploy (lerngesellschaft.ch)
        run: |
          rm -rf _site_de
          cp -r _site _site_de
          echo "lerngesellschaft.ch" > _site_de/CNAME
          cat > _site_de/index.html <<'EOF'
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <title>Lerngesellschaft</title>
            <meta http-equiv="refresh" content="0; url=/de/">
            <link rel="canonical" href="https://lerngesellschaft.ch/de/">
            <script>location.replace('/de/')</script>
          </head>
          <body><p><a href="/de/">Lerngesellschaft</a></p></body>
          </html>
          EOF


      - name: Deploy DE → gh-pages of this repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site_de
          cname: lerngesellschaft.ch

      # learningsociety.ch is a permanent redirect to lerngesellschaft.ch/en/
      # (configured manually on the gh-pages branch of that repo). No deploy
      # step needed here; the EN content lives at lerngesellschaft.ch/en/.
